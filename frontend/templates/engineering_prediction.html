<div class="card">
    <div class="card-header bg-success text-white">
        <h4>Engineering Faculty Prediction</h4>
    </div>
    <div class="card-body">
        <form id="engineering-prediction-form">
            <!-- Residence -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="residence">Residence</label>
                    <select class="form-control" id="residence" name="residence" required>
                        <option value="">Select Residence</option>
                        <option value="Y">Yes</option>
                        <option value="N">No</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="ften_status">FTEN Status</label>
                    <select class="form-control" id="ften_status" name="ften_status" required>
                        <option value="">Select FTEN Status</option>
                        <option value="N">N</option>
                        <option value="F">F</option>
                        <option value="T">T</option>
                        <option value="E">E</option>
                    </select>
                </div>
            </div>

            <!-- Bursary and Offering Type -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="bursary">Bursary</label>
                    <select class="form-control" id="bursary" name="bursary" required>
                        <option value="">Select Bursary Status</option>
                        <option value="N">No</option>
                        <option value="Y">Yes</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="offering_type">Offering Type</label>
                    <select class="form-control" id="offering_type" name="offering_type" required>
                        <option value="">Select Offering Type</option>
                        <option value="D1">D1</option>
                        <option value="D3">D3</option>
                        <option value="P1">P1</option>
                        <option value="I1">I1</option>
                        <option value="P3">P3</option>
                        <option value="I3">I3</option>
                        <option value="D2">D2</option>
                        <option value="D6">D6</option>
                        <option value="D8">D8</option>
                        <option value="I7">I7</option>
                        <option value="D7">D7</option>
                        <option value="P7">P7</option>
                    </select>
                </div>
            </div>

            <!-- Disability and Age Group -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="disability">Disability</label>
                    <select class="form-control" id="disability" name="disability" required>
                        <option value="">Select Disability Status</option>
                        <option value="N">No</option>
                        <option value="Y">Yes</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="age_group">Age Group</label>
                    <select class="form-control" id="age_group" name="age_group" required>
                        <option value="">Select Age Group</option>
                        <option value="15-19">15-19</option>
                        <option value="20-29">20-29</option>
                        <option value="30-39">30-39</option>
                        <option value="40-49">40-49</option>
                        <option value=">50">>50</option>
                    </select>
                </div>
            </div>

            <!-- Exam Type and Month -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="exam_type">Exam Type</label>
                    <select class="form-control" id="exam_type" name="exam_type" required>
                        <option value="">Select Exam Type</option>
                        <option value="NORMAL EXAM">Normal Exam</option>
                        <option value="RE-EXAM(SUPP-MIDYEAR/YEAR END)">Re-Exam</option>
                        <option value="SPECIAL EXAM">Special Exam</option>
                        <option value="EXPERIENTIAL TRAINING">Experiential Training</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="exam_month">Exam Month</label>
                    <input type="number" class="form-control" id="exam_month" name="exam_month" required>
                </div>
            </div>

            <!-- Race and Gender -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="race">Race</label>
                    <select class="form-control" id="race" name="race" required>
                        <option value="">Select Race</option>
                        <option value="AFRICAN">African</option>
                        <option value="INDIAN">Indian</option>
                        <option value="WHITE">White</option>
                        <option value="COLOURED">Coloured</option>
                        <option value="NON SA">Non-SA</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="gender">Gender</label>
                    <select class="form-control" id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>
            </div>

            <!-- Student Type and Marital Status -->
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="stud_type">Student Type</label>
                    <select class="form-control" id="stud_type" name="stud_type" required>
                        <option value="">Select Student Type</option>
                        <option value="NORMAL STUDENT">Normal Student</option>
                        <option value="SADC STUDENT">SADC Student</option>
                        <option value="INTERNATIONAL STUDENT">International Student</option>
                        <option value="REFUGEE">Refugee</option>
                        <option value="ASYLUM SEEKER">Asylum Seeker</option>
                    </select>
                </div>
                <div class="form-group col-md-6">
                    <label for="marital_status">Marital Status</label>
                    <select class="form-control" id="marital_status" name="marital_status" required>
                        <option value="">Select Marital Status</option>
                        <option value="M">Married</option>
                        <option value="S">Single</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Predict</button>
        </form>

        <div id="engineering-result" class="mt-4" style="display: none;">
            <!-- Results will be displayed here -->
        </div>
    </div>
</div>

<script>
document.getElementById('engineering-prediction-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = {};
    formData.forEach((value, key) => data[key] = value);
    
    fetch('/predictions/engineering', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        const resultDiv = document.getElementById('engineering-result');
        resultDiv.style.display = 'block';
        
        // Format the prediction result
        resultDiv.innerHTML = `
            <div class="card">
                <div class="card-header ${data.prediction.result === 'Student Passed' ? 'bg-success' : 'bg-danger'} text-white">
                    <h4>Prediction Result: ${data.prediction.result}</h4>
                </div>
                <div class="card-body">
                    <p>Pass Probability: ${(data.prediction.pass_probability * 100).toFixed(2)}%</p>
                    <p>Fail Probability: ${(data.prediction.fail_probability * 100).toFixed(2)}%</p>
                    
                    <h5>Feature Importance</h5>
                    <div id="engineering-shap-chart"></div>
                </div>
            </div>
        `;
        
        // Here you would add code to render the SHAP chart using a library like Chart.js
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred while making the prediction.');
    });
});
</script>
